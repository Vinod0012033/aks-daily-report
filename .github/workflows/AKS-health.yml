```
permissions:
  id-token: write
  contents: read

steps:

  # Checkout Repository
  - name: Checkout repository
    uses: actions/checkout@v4

  # Azure Login
  - name: Azure Login
    uses: azure/login@v2
    with:
      creds: ${{ secrets.AZURE_CREDENTIALS }}

  # Install tools
  - name: Install kubectl and jq
    run: |
      az aks install-cli
      sudo apt-get update
      sudo apt-get install -y jq

  # Run AKS health script
  - name: Run AKS Multi-Subscription Health Scan
    run: |
      chmod +x scripts/aks_health_all_subs.sh
      ./scripts/aks_health_all_subs.sh

  # Validate report exists
  - name: Verify report file exists
    run: |
      if [ ! -f "reports/AKS Cluster Health.html" ]; then
        echo "ERROR: Report file not found"
        ls -R reports || true
        exit 1
      fi

  # Upload report to storage
  - name: Upload HTML Report to Azure Storage
    id: upload
    run: |
      CONTAINER=${{ secrets.AZURE_STORAGE_CONTAINER }}
      ACCOUNT=${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
      KEY=${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}

      TS=$(date +"%Y-%m-%d-%H-%M")
      REPORT_NAME="AKS-Health-Report-$TS.html"

      echo "Uploading report $REPORT_NAME"

      az storage blob upload \
        --account-name $ACCOUNT \
        --account-key $KEY \
        --container-name $CONTAINER \
        --file "reports/AKS Cluster Health.html" \
        --name "$REPORT_NAME" \
        --overwrite false

      echo "report_name=$REPORT_NAME" >> $GITHUB_OUTPUT

  # Generate SAS URL
  - name: Generate SAS URL
    id: sas
    run: |
      ACCOUNT=${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
      KEY=${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}
      CONTAINER=${{ secrets.AZURE_STORAGE_CONTAINER }}
      BLOB=${{ steps.upload.outputs.report_name }}

      EXPIRY=$(date -u -d "3 days" '+%Y-%m-%dT%H:%MZ')

      TOKEN=$(az storage blob generate-sas \
        --account-name $ACCOUNT \
        --account-key $KEY \
        --container-name $CONTAINER \
        --name "$BLOB" \
        --permissions r \
        --expiry $EXPIRY \
        -o tsv)

      URL="https://$ACCOUNT.blob.core.windows.net/$CONTAINER/$BLOB?$TOKEN"

      echo "sasurl=$URL" >> $GITHUB_OUTPUT

  # Display Report URL
  - name: Show Report URL
    run: |
      echo "================================="
      echo "AKS Health Report Uploaded"
      echo "File: ${{ steps.upload.outputs.report_name }}"
      echo "URL:"
      echo "${{ steps.sas.outputs.sasurl }}"
      echo "================================="
