```
permissions:
  contents: read
  id-token: write

steps:

- name: Checkout repository
  uses: actions/checkout@v4

- name: Azure Login
  uses: azure/login@v2
  with:
    client-id: ${{ secrets.AZURE_CLIENT_ID }}
    tenant-id: ${{ secrets.AZURE_TENANT_ID }}
    subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

- name: Verify Azure login
  run: az account show

- name: Install tools
  run: |
    az aks install-cli
    sudo apt-get update
    sudo apt-get install -y jq

- name: Run AKS Health Script
  run: |
    chmod +x scripts/aks_health_all_subs.sh
    ./scripts/aks_health_all_subs.sh

- name: Check report exists
  run: |
    if [ ! -f "reports/AKS Cluster Health.html" ]; then
      echo "Report not found"
      exit 1
    fi

- name: Upload report to Azure Storage
  id: upload
  run: |
    TS=$(date +"%Y-%m-%d-%H-%M")
    REPORT_NAME="AKS-Health-Report-$TS.html"

    az storage blob upload \
      --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }} \
      --account-key ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }} \
      --container-name ${{ secrets.AZURE_STORAGE_CONTAINER }} \
      --file "reports/AKS Cluster Health.html" \
      --name "$REPORT_NAME"

    echo "report_name=$REPORT_NAME" >> $GITHUB_OUTPUT

- name: Generate SAS URL
  id: sas
  run: |
    EXPIRY=$(date -u -d "3 days" '+%Y-%m-%dT%H:%MZ')

    TOKEN=$(az storage blob generate-sas \
      --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }} \
      --account-key ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }} \
      --container-name ${{ secrets.AZURE_STORAGE_CONTAINER }} \
      --name "${{ steps.upload.outputs.report_name }}" \
      --permissions r \
      --expiry $EXPIRY \
      -o tsv)

    URL="https://${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}.blob.core.windows.net/${{ secrets.AZURE_STORAGE_CONTAINER }}/${{ steps.upload.outputs.report_name }}?$TOKEN"

    echo "Report URL: $URL"
